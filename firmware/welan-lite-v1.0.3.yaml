text_sensor:
  - platform: template
    name: "SYS WiFi信号强度"
    update_interval: 10s
    web_server:
      sorting_weight: 90
    lambda: |-
      if (!id(wifi_signal_dbm).has_state()) return {"检测中..."};
      float rssi = id(wifi_signal_dbm).state;
      if (rssi >= -55) return {"极好"};
      if (rssi >= -67) return {"较好"};
      if (rssi >= -75) return {"一般"};
      if (rssi >= -85) return {"较差"};
      return {"差"};

  - platform: template
    name: "SYS 配网说明"
    update_interval: 60s
    web_server:
      sorting_weight: 91
    lambda: |-
      return {"连接热点“Welan-Lite-Setup”配网。设备会自动进入搬家重新配网模式。"};

  - platform: template
    name: "SYS 当前控制状态"
    update_interval: 5s
    web_server:
      sorting_weight: 92
    lambda: |-
      if (id(manual_override_active)) return {"手动临时覆盖中"};
      if (id(p1_enable).state || id(p2_enable).state || id(p3_enable).state) return {"定时待命/自动运行"};
      return {"纯手动模式"};

button:
  - platform: restart
    name: "SYS 重启设备"
    entity_category: config
    web_server:
      sorting_weight: 98

  - platform: factory_reset
    name: "SYS 恢复出厂设置"
    entity_category: config
    web_server:
      sorting_weight: 99
