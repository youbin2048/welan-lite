<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Welan Lite</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <div class="container">
      <section class="card top-card">
        <div class="top-row">
          <div>
            <h1>Welan Lite</h1>
            <p class="sub">本地控制</p>
          </div>
          <div class="online-dot-wrap">
            <span class="online-dot"></span>
            <span class="online-text">在线</span>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <div class="label">Wi-Fi 信号</div>
            <div class="value">极好</div>
          </div>
          <div class="info-item">
            <div class="label">固件版本</div>
            <div class="value">v1.0.3</div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <h2>主控制</h2>
            <p class="sub">开关与亮度</p>
          </div>
          <button id="mainSwitch" class="switch on">
            <span>开</span>
          </button>
        </div>

        <div class="main-panel">
          <div class="brightness-row">
            <div>
              <div class="label">当前亮度</div>
              <div class="big-value"><span id="brightnessValue">30</span>%</div>
            </div>
          </div>

          <div class="slider-wrap">
            <input id="brightnessSlider" type="range" min="0" max="100" value="30" />
            <div class="slider-scale">
              <span>0</span>
              <span>100</span>
            </div>
          </div>

          <div class="quick-grid">
            <button class="quick-btn" data-level="10">10%</button>
            <button class="quick-btn active" data-level="30">30%</button>
            <button class="quick-btn" data-level="50">50%</button>
            <button class="quick-btn" data-level="100">100%</button>
          </div>

          <div class="mindfulness-panel">
            <div class="mindfulness-copy">
              <div class="label">正念呼吸灯</div>
              <div id="mindfulnessStatus" class="mindfulness-status">未开启</div>
              <div class="sub">5-1-5-1 节奏，持续 15 分钟</div>
            </div>
            <button id="mindfulnessToggleBtn" class="mindfulness-btn" type="button">进入正念</button>
          </div>
        </div>
      </section>

      <section class="timing-section">
        <div class="section-title">
          <h2>定时设置</h2>
        </div>

        <div class="period-list">
          <article class="card period-card">
            <div class="period-top">
              <div>
                <h3>场景一</h3>
                <p class="sub">未生效</p>
              </div>
              <button id="scene1Switch" class="mini-switch on"><span>开</span></button>
            </div>

            <div class="time-panel">
              <div class="label">时间范围</div>
              <div class="time-row">
                <button id="scene1StartBtn" class="time-box">
                  <span class="time-label">开始</span>
                  <span id="scene1StartText" class="time">06:00</span>
                </button>
                <span class="time-sep">至</span>
                <button id="scene1EndBtn" class="time-box">
                  <span class="time-label">结束</span>
                  <span id="scene1EndText" class="time">08:00</span>
                </button>
              </div>
            </div>

            <div class="period-footer">
              <div>
                <div class="label">亮度</div>
                <div id="scene1BrightnessValue" class="footer-value">30%</div>
              </div>
              <button id="scene1BrightnessBtn" class="edit-btn">调整</button>
            </div>
          </article>

          <article class="card period-card">
            <div class="period-top">
              <div>
                <h3>场景二</h3>
                <p class="sub">已启用</p>
              </div>
              <button id="scene2Switch" class="mini-switch on"><span>开</span></button>
            </div>

            <div class="time-panel">
              <div class="label">时间范围</div>
              <div class="time-row">
                <button id="scene2StartBtn" class="time-box">
                  <span class="time-label">开始</span>
                  <span id="scene2StartText" class="time">18:00</span>
                </button>
                <span class="time-sep">至</span>
                <button id="scene2EndBtn" class="time-box">
                  <span class="time-label">结束</span>
                  <span id="scene2EndText" class="time">22:00</span>
                </button>
              </div>
            </div>

            <div class="period-footer">
              <div>
                <div class="label">亮度</div>
                <div id="scene2BrightnessValue" class="footer-value">30%</div>
              </div>
              <button id="scene2BrightnessBtn" class="edit-btn">调整</button>
            </div>
          </article>

          <article class="card period-card">
            <div class="period-top">
              <div>
                <h3>场景三</h3>
                <p class="sub">未启用</p>
              </div>
              <button id="scene3Switch" class="mini-switch off"><span>关</span></button>
            </div>

            <div class="time-panel">
              <div class="label">时间范围</div>
              <div class="time-row">
                <button id="scene3StartBtn" class="time-box">
                  <span class="time-label">开始</span>
                  <span id="scene3StartText" class="time">12:00</span>
                </button>
                <span class="time-sep">至</span>
                <button id="scene3EndBtn" class="time-box">
                  <span class="time-label">结束</span>
                  <span id="scene3EndText" class="time">14:00</span>
                </button>
              </div>
            </div>

            <div class="period-footer">
              <div>
                <div class="label">亮度</div>
                <div id="scene3BrightnessValue" class="footer-value">50%</div>
              </div>
              <button id="scene3BrightnessBtn" class="edit-btn">调整</button>
            </div>
          </article>
        </div>
      </section>

      <section class="card system-card">
        <div class="section-title no-margin">
          <h2>系统</h2>
          <p class="sub">信息与维护</p>
        </div>

        <div class="sys-list">
          <div class="ota-panel">
            <div class="sys-title">本地升级固件</div>
            <div class="sub">选择 .bin 文件升级</div>
            <div class="ota-actions">
              <input id="otaFileInput" class="ota-file-input" type="file" accept=".bin,application/octet-stream" />
              <button id="otaUploadBtn" class="ota-upload-btn" type="button">上传固件</button>
            </div>
            <div class="ota-progress" aria-hidden="true">
              <div id="otaProgressBar" class="ota-progress-bar"></div>
            </div>
            <div id="otaStatusText" class="sub ota-status">未选择文件</div>
          </div>

          <button id="restartBtn" class="sys-item">
            <div>
              <div class="sys-title">重启设备</div>
              <div class="sub">立即重启</div>
            </div>
            <span class="arrow">进入</span>
          </button>

          <button id="factoryResetBtn" class="sys-item danger">
            <div>
              <div class="sys-title danger-text">恢复出厂设置</div>
              <div class="sub danger-sub">清除本地配置</div>
            </div>
            <span class="arrow danger-sub">进入</span>
          </button>
        </div>
      </section>
    </div>
  </div>

  <div id="timeModal" class="modal hidden" aria-hidden="true">
    <div class="modal-mask"></div>
    <div class="modal-panel">
      <div class="modal-head">
        <div>
          <div id="timeModalTitle" class="modal-title">设置时间</div>
          <div class="modal-sub">选择后确认</div>
        </div>
        <button id="timeModalClose" class="modal-close" type="button">✕</button>
      </div>

      <div class="modal-body">
        <input id="timeInput" class="time-input" type="time" step="60" />
      </div>

      <div class="modal-actions">
        <button id="timeModalCancel" class="modal-btn secondary" type="button">取消</button>
        <button id="timeModalConfirm" class="modal-btn primary" type="button">确认</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
