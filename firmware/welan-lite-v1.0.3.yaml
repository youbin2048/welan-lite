substitutions:
  device_name: welan-lite
  friendly_name: "微澜 Lite"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Welan Lite v1.1.1"

external_components:
  - source:
      type: local
      path: components
    components: [web_assets]

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:
  level: INFO

api:

ota:
  - platform: esphome

preferences:
  flash_write_interval: 1min

wifi:
  power_save_mode: none
  reboot_timeout: 15min
  ap:
    ssid: "Welan-Lite-Setup"
    password: "12345678"

captive_portal:

improv_serial:

web_server:
  port: 80
  version: 3

web_assets:
  index_html: assets/index.html.gz
  app_css: assets/app.css.gz
  app_js: assets/app.js.gz

time:
  - platform: sntp
    id: sntp_time
    timezone: Asia/Shanghai

globals:
  - id: manual_override_active
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: manual_override_until_minute
    type: int
    restore_value: no
    initial_value: '-1'

  - id: last_applied_percent
    type: int
    restore_value: no
    initial_value: '-999'

  - id: last_nonzero_brightness
    type: int
    restore_value: true
    initial_value: '50'

output:
  - platform: ledc
    id: pwm_output
    pin: GPIO10
    frequency: 1220Hz

light:
  - platform: monochromatic
    id: aquarium_light
    internal: true
    output: pwm_output
    default_transition_length: 500ms
    restore_mode: RESTORE_DEFAULT_OFF

script:
  - id: apply_percent_brightness
    parameters:
      percent: int
    then:
      - lambda: |-
          int p = percent;
          if (p <= 0) {
            auto call = id(aquarium_light).turn_off();
            call.perform();
          } else {
            float mapped = 44.0f + (float(p - 1) * 211.0f / 99.0f);
            float brightness = mapped / 255.0f;
            auto call = id(aquarium_light).turn_on();
            call.set_brightness(brightness);
            call.perform();
          }

  - id: sync_manual_brightness_from_light
    then:
      - lambda: |-
          if (!id(aquarium_light).current_values.is_on()) {
            id(brightness_percent).publish_state(0);
            return;
          }

          float b = id(aquarium_light).current_values.get_brightness();
          int raw = int(roundf(b * 255.0f));
          int p = 1;

          if (raw <= 44) {
            p = 1;
          } else {
            p = int(roundf((raw - 44) * 99.0f / 211.0f)) + 1;
          }

          if (p < 1) p = 1;
          if (p > 100) p = 100;
          id(brightness_percent).publish_state(p);

  - id: clear_manual_override
    then:
      - lambda: |-
          id(manual_override_active) = false;
          id(manual_override_until_minute) = -1;

  - id: enter_manual_override
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;

          int cur = now.hour * 60 + now.minute;
          int next_boundary = -1;

          auto consider_boundary = [&](int minute_of_day) {
            if (minute_of_day > cur) {
              if (next_boundary < 0 || minute_of_day < next_boundary) {
                next_boundary = minute_of_day;
              }
            }
          };

          if (id(p1_enable).state) {
            consider_boundary(int(id(p1_on_h).state) * 60 + int(id(p1_on_m).state));
            consider_boundary(int(id(p1_off_h).state) * 60 + int(id(p1_off_m).state));
          }
          if (id(p2_enable).state) {
            consider_boundary(int(id(p2_on_h).state) * 60 + int(id(p2_on_m).state));
            consider_boundary(int(id(p2_off_h).state) * 60 + int(id(p2_off_m).state));
          }
          if (id(p3_enable).state) {
            consider_boundary(int(id(p3_on_h).state) * 60 + int(id(p3_on_m).state));
            consider_boundary(int(id(p3_off_h).state) * 60 + int(id(p3_off_m).state));
          }

          if (next_boundary < 0) {
            int earliest = -1;
            auto consider_earliest = [&](int minute_of_day) {
              if (earliest < 0 || minute_of_day < earliest) {
                earliest = minute_of_day;
              }
            };

            if (id(p1_enable).state) {
              consider_earliest(int(id(p1_on_h).state) * 60 + int(id(p1_on_m).state));
              consider_earliest(int(id(p1_off_h).state) * 60 + int(id(p1_off_m).state));
            }
            if (id(p2_enable).state) {
              consider_earliest(int(id(p2_on_h).state) * 60 + int(id(p2_on_m).state));
              consider_earliest(int(id(p2_off_h).state) * 60 + int(id(p2_off_m).state));
            }
            if (id(p3_enable).state) {
              consider_earliest(int(id(p3_on_h).state) * 60 + int(id(p3_on_m).state));
              consider_earliest(int(id(p3_off_h).state) * 60 + int(id(p3_off_m).state));
            }

            next_boundary = earliest;
          }

          if (next_boundary >= 0) {
            id(manual_override_active) = true;
            id(manual_override_until_minute) = next_boundary;
          } else {
            id(manual_override_active) = false;
            id(manual_override_until_minute) = -1;
          }

  - id: evaluate_control
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;

          int cur = now.hour * 60 + now.minute;

          if (id(manual_override_active)) {
            if (cur == id(manual_override_until_minute)) {
              id(manual_override_active) = false;
              id(manual_override_until_minute) = -1;
            } else {
              return;
            }
          }

          int target = 0;

          auto in_period = [&](int start_m, int end_m) -> bool {
            if (start_m == end_m) return false;
            if (start_m < end_m) {
              return cur >= start_m && cur < end_m;
            } else {
              return cur >= start_m || cur < end_m;
            }
          };

          if (id(p1_enable).state) {
            int start_m = int(id(p1_on_h).state) * 60 + int(id(p1_on_m).state);
            int end_m   = int(id(p1_off_h).state) * 60 + int(id(p1_off_m).state);
            if (in_period(start_m, end_m)) {
              target = int(id(p1_bright).state);
            }
          }

          if (id(p2_enable).state) {
            int start_m = int(id(p2_on_h).state) * 60 + int(id(p2_on_m).state);
            int end_m   = int(id(p2_off_h).state) * 60 + int(id(p2_off_m).state);
            if (in_period(start_m, end_m)) {
              target = int(id(p2_bright).state);
            }
          }

          if (id(p3_enable).state) {
            int start_m = int(id(p3_on_h).state) * 60 + int(id(p3_on_m).state);
            int end_m   = int(id(p3_off_h).state) * 60 + int(id(p3_off_m).state);
            if (in_period(start_m, end_m)) {
              target = int(id(p3_bright).state);
            }
          }

          if (target != id(last_applied_percent)) {
            id(last_applied_percent) = target;

            if (target <= 0) {
              auto off_call = id(aquarium_light).turn_off();
              off_call.perform();
              id(brightness_percent).publish_state(0);
            } else {
              id(apply_percent_brightness)->execute(target);
              id(brightness_percent).publish_state(target);
            }
          }

interval:
  - interval: 10s
    then:
      - script.execute: evaluate_control

sensor:
  - platform: wifi_signal
    id: wifi_signal_dbm
    update_interval: 10s
    internal: true

switch:
  - platform: template
    name: "MANUAL 1 手动总开关"
    id: light_switch
    lambda: |-
      return id(aquarium_light).current_values.is_on();
    turn_on_action:
      - lambda: |-
          int p = int(id(brightness_percent).state);
          if (p <= 0) {
            p = id(last_nonzero_brightness);
          }
          if (p <= 0) {
            p = 30;
          }
          id(brightness_percent).publish_state(p);
          id(apply_percent_brightness)->execute(p);
      - script.execute: enter_manual_override
    turn_off_action:
      - lambda: |-
          int p = int(id(brightness_percent).state);
          if (p > 0) {
            id(last_nonzero_brightness) = p;
          }
      - light.turn_off: aquarium_light
      - number.set:
          id: brightness_percent
          value: 0
      - script.execute: enter_manual_override
    web_server:
      sorting_weight: 10

  - platform: template
    name: "T1 时段1启用"
    id: p1_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          id(last_applied_percent) = -999;
      - script.execute: clear_manual_override
      - script.execute: evaluate_control
    turn_off_action:
      - lambda: |-
          id(last_applied_percent) = -999;
      - script.execute: clear_manual_override
      - script.execute: evaluate_control
    web_server:
      sorting_weight: 20

  - platform: template
