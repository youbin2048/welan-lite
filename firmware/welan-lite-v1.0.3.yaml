    name: "BRT 当前亮度"
    id: brightness_percent
    min_value: 0
    max_value: 100
    step: 1
    restore_value: true
    optimistic: true
    web_server:
      sorting_weight: 11
    set_action:
      - lambda: |-
          int p = int(x);
          if (p > 0) {
            id(last_nonzero_brightness) = p;
          }
          id(apply_percent_brightness)->execute(p);
      - script.execute: enter_manual_override

